name: mupt-dev
channels:
  - conda-forge
  - defaults
dependencies:
  # Basic Python dependencies
  - python>=3.12,<3.14  # <3.14 because of https://github.com/openforcefield/openff-units/pull/178
  - pip
  - jupyterlab

  # Unit testing
  - pytest
  - pytest-cov
  - codecov
  - nbval

  # Mathematics and scientific computing
  - numpy
  - scipy>=1.16.0 # required to allow use of RigidTransform
  - sympy
  - unyt

  # Graphs
  - anytree
  - networkx

  # Visualization
  - rich
  - matplotlib
  - ipympl

  # Molecular libraries
  - rdkit
  - py3Dmol
  - openbabel>=3.0
  - mbuild >=1.0
  - periodictable

  # MD libraries
  - openff-toolkit
  - openff-interchange
  - hoomd=5.3.0
  - freud=3.0
  # - fresnel
  # Chemistry
  - rdkit
  - periodictable

  # Molecular Dynamics toolkits
  ## OpenFF
  - openff-toolkit>=0.18
  - openff-interchange>=0.5

  ## HOOMD
  - hoomd
  - gsd>=3.0
  - freud
  - fresnel

  ## MoSDeF
  # - mbuild # DEV: dependencies and env solve really don't play nice w/ OpenFF - hiding for now, since unused in code + examples
  - gmso

  ## Analysis
  - mdanalysis

  - pip:
    - build
    - twine
